name: CI

# Runs on every PR and on pushes to main: typecheck, lint, build, and test.
# The tag-driven publish/release workflows only typecheck+build, so this is the
# gate that actually exercises lint and the test suite before code merges.
on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install
        env:
          # Needed to resolve the private @belal-elsabbagh-apex scope.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
