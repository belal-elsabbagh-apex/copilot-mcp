name: Release on tag

# Push a tag like v1.2.0 -> create a GitHub Release with auto-generated notes.
# The publish workflow keys off the SAME tag push (a GITHUB_TOKEN-created release
# does NOT trigger other workflows), so publishing happens in parallel.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      # Build the self-contained minified bundle and pack a tarball. The stable
      # `copilot-mcp.tgz` name backs the `releases/latest/download/…` URL; the
      # version-stamped tarball npm pack emits stays attached for pinning.
      - name: Build and pack
        run: |
          bun run build
          npm pack
          cp "$(ls *.tgz)" copilot-mcp.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tgz"
