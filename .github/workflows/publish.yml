name: Publish (private GitHub Packages)

# Publishes @belal-elsabbagh-apex/copilot-mcp to this repo's GitHub Packages
# registry on every version tag push (vX.Y.Z), or on manual dispatch. Keyed off the
# tag (not `release: published`) because a GITHUB_TOKEN-created release does not
# trigger workflows. The package stays PRIVATE (publishConfig.access=restricted).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Publish to GitHub Packages
        run: bun publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
